AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Task rollover app — moves incomplete Google Calendar tasks to the next day

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 60
    MemorySize: 128

Resources:
  TaskRolloverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-rollover
      Handler: src/index.handler
      Description: Rolls over incomplete tasks in Google Calendar at midnight
      Events:
        MidnightCron:
          Type: Schedule
          Properties:
            # Run at 23:00 local time (end of day) so incomplete tasks roll to tomorrow.
            # 23:00 BST (UTC+1, summer) = 22:00 UTC → cron(0 22 * * ? *)
            # 23:00 GMT (UTC+0, winter) = 23:00 UTC → cron(0 23 * * ? *)
            # Currently set for BST (April–October). Change to 23 in winter.
            Schedule: cron(0 22 * * ? *)
            Name: task-rollover-midnight
            Description: Triggers task rollover at midnight
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/taskapp/*
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"

Outputs:
  TaskRolloverFunction:
    Description: Lambda function ARN
    Value: !GetAtt TaskRolloverFunction.Arn
